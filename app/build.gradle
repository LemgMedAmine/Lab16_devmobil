plugins {
    id "com.android.application"
}

android {
    namespace "com.example.servicechronometrejava"
    compileSdk 36

    defaultConfig {
        applicationId "com.example.servicechronometrejava"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.7.1"
    implementation "androidx.core:core:1.18.0"
}
